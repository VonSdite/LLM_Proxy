{% extends "base_page.html" %}

{% block page_title %}管理员登录 - LLM Proxy{% endblock %}
{% block page_css %}<link rel="stylesheet" href="/static/css/login.css">{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
    <div class="login-shell">
        <div class="login-head">
            <h1>登录</h1>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-login" id="loginBtn">登录</button>
            </form>
        </div>
    </div>
{% endblock %}

{% block page_scripts %}
    <script src="/static/js/ui-message.js?v=20260319-1"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                    return;
                }

                showActionError('登录', data.error, { fallback: '登录失败，请检查用户名和密码' });
            } catch (error) {
                console.error('登录请求失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
            }

            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        });
    </script>
{% endblock %}
