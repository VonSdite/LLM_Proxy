{% extends "base_page.html" %}

{% block page_title %}管理员登录 - LLM Proxy{% endblock %}
{% block page_css %}<link rel="stylesheet" href="/static/css/login.css">{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
    <div class="login-shell">
        <div class="login-head">
            <h1>登录</h1>
        </div>
        <div class="login-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">密码</label>
                    <div class="sensitive-input-shell">
                        <input
                            type="text"
                            class="form-control sensitive-input-control"
                            id="password"
                            name="password"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                            spellcheck="false"
                            required
                        >
                        <button
                            type="button"
                            class="sensitive-input-toggle"
                            data-sensitive-toggle-for="password"
                            data-sensitive-label="密码"
                            onclick="toggleSensitiveInputVisibility('password')"
                            aria-controls="password"
                            aria-pressed="false"
                            aria-label="显示密码"
                            title="显示密码"
                        >
                            <svg class="sensitive-input-icon sensitive-input-icon-eye" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M2.25 12s3.75-6.75 9.75-6.75S21.75 12 21.75 12s-3.75 6.75-9.75 6.75S2.25 12 2.25 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3.25" fill="none" stroke="currentColor" stroke-width="1.8"/>
                            </svg>
                            <svg class="sensitive-input-icon sensitive-input-icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                <path d="M10.58 10.58A2 2 0 0 0 10 12a2 2 0 0 0 3.42 1.42" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9.88 5.35A10.62 10.62 0 0 1 12 5.25c6 0 9.75 6.75 9.75 6.75a18.8 18.8 0 0 1-3.04 3.83" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M6.31 6.31A18.14 18.14 0 0 0 2.25 12S6 18.75 12 18.75a10.7 10.7 0 0 0 5.69-1.69" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span class="visually-hidden">显示密码</span>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login" id="loginBtn">登录</button>
            </form>
        </div>
    </div>
{% endblock %}

{% block page_scripts %}
    <script src="/static/js/ui-message.js?v=20260319-1"></script>
    <script>
        const loginSensitiveInputIds = ['password'];
        const loginSensitiveAutoVisibleIds = new Set();
        const loginSensitiveRevealTimers = new Map();
        const loginSensitiveRevealDelayMs = 500;

        function clearSensitiveInputAutoReveal(inputId) {
            const timerId = loginSensitiveRevealTimers.get(inputId);
            if (timerId) {
                window.clearTimeout(timerId);
                loginSensitiveRevealTimers.delete(inputId);
            }
            loginSensitiveAutoVisibleIds.delete(inputId);
        }

        function syncSensitiveInputToggle(inputId) {
            const input = document.getElementById(inputId);
            const toggleButton = document.querySelector(`[data-sensitive-toggle-for="${inputId}"]`);
            if (!input || !toggleButton) {
                return;
            }
            const hasValue = input.value.trim() !== '';
            if (!hasValue && !loginSensitiveAutoVisibleIds.has(inputId)) {
                clearSensitiveInputAutoReveal(inputId);
                toggleButton.dataset.sensitiveManualVisible = 'false';
            }
            const isManualVisible = toggleButton.dataset.sensitiveManualVisible === 'true';
            const isVisible = isManualVisible || loginSensitiveAutoVisibleIds.has(inputId);
            input.classList.toggle('is-masked', hasValue && !isVisible);
            toggleButton.hidden = !hasValue;
            toggleButton.classList.toggle('is-visible', isManualVisible);
            const label = toggleButton.dataset.sensitiveLabel || '内容';
            const actionText = isManualVisible ? '隐藏' : '显示';
            toggleButton.setAttribute('aria-pressed', isManualVisible ? 'true' : 'false');
            toggleButton.setAttribute('aria-label', `${actionText}${label}`);
            toggleButton.title = `${actionText}${label}`;
            const hiddenText = toggleButton.querySelector('.visually-hidden');
            if (hiddenText) {
                hiddenText.textContent = `${actionText}${label}`;
            }
        }

        function setSensitiveInputVisibility(inputId, visible) {
            const toggleButton = document.querySelector(`[data-sensitive-toggle-for="${inputId}"]`);
            if (!toggleButton) {
                return;
            }
            clearSensitiveInputAutoReveal(inputId);
            toggleButton.dataset.sensitiveManualVisible = visible ? 'true' : 'false';
            syncSensitiveInputToggle(inputId);
        }

        function temporarilyRevealSensitiveInput(inputId) {
            const input = document.getElementById(inputId);
            const toggleButton = document.querySelector(`[data-sensitive-toggle-for="${inputId}"]`);
            if (!input || !toggleButton) {
                return;
            }
            if (toggleButton.dataset.sensitiveManualVisible === 'true' || input.value.trim() === '') {
                syncSensitiveInputToggle(inputId);
                return;
            }
            clearSensitiveInputAutoReveal(inputId);
            loginSensitiveAutoVisibleIds.add(inputId);
            syncSensitiveInputToggle(inputId);
            const timerId = window.setTimeout(() => {
                loginSensitiveRevealTimers.delete(inputId);
                loginSensitiveAutoVisibleIds.delete(inputId);
                syncSensitiveInputToggle(inputId);
            }, loginSensitiveRevealDelayMs);
            loginSensitiveRevealTimers.set(inputId, timerId);
        }

        function toggleSensitiveInputVisibility(inputId) {
            const toggleButton = document.querySelector(`[data-sensitive-toggle-for="${inputId}"]`);
            const input = document.getElementById(inputId);
            if (!toggleButton || !input) {
                return;
            }
            const isManualVisible = toggleButton.dataset.sensitiveManualVisible === 'true';
            setSensitiveInputVisibility(inputId, !isManualVisible);
            input.focus({ preventScroll: true });
        }

        function resetSensitiveInputs() {
            loginSensitiveInputIds.forEach(inputId => {
                const toggleButton = document.querySelector(`[data-sensitive-toggle-for="${inputId}"]`);
                if (toggleButton) {
                    toggleButton.dataset.sensitiveManualVisible = 'false';
                }
                clearSensitiveInputAutoReveal(inputId);
                syncSensitiveInputToggle(inputId);
            });
        }

        resetSensitiveInputs();
        loginSensitiveInputIds.forEach(inputId => {
            const input = document.getElementById(inputId);
            if (!input) {
                return;
            }
            input.addEventListener('input', function() {
                temporarilyRevealSensitiveInput(inputId);
            });
            input.addEventListener('blur', function() {
                if (document.activeElement?.closest(`[data-sensitive-toggle-for="${inputId}"]`)) {
                    return;
                }
                clearSensitiveInputAutoReveal(inputId);
                syncSensitiveInputToggle(inputId);
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                    return;
                }

                showActionError('登录', data.error, { fallback: '登录失败，请检查用户名和密码' });
            } catch (error) {
                console.error('登录请求失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
            }

            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        });
    </script>
{% endblock %}
