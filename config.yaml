server:
  port: 8080
  host: 127.0.0.1
logging:
  llm_request_debug_enabled: false
chat:
  whitelist_enabled: true
admin:
  username: admin
  password: admin
providers:
- name: volc_code
  enabled: true
  api: https://ark.cn-beijing.volces.com/api/coding/v3/chat/completions
  transport: http
  source_format: openai_chat
  api_key:
  verify_ssl: false
  model_list:
  - ark-code-latest
  - kimi-k2.5
  - MiniMax-M2.5
  - GLM-4.7
  - DeepSeek-V3.2
  - Doubao-Seed-2.0-Code
  - Doubao-Seed-2.0-pro
- name: deepseek
  enabled: false
  api: https://api.deepseek.com/v1/chat/completions
  transport: http
  source_format: openai_chat
  api_key:
  verify_ssl: false
  model_list:
  - deepseek-chat
  - deepseek-reasoner
auth_groups:
- name: group1
  strategy: least_inflight
  cooldown_seconds_on_429: 60
  entries:
  - id: key1
    enabled: true
    headers:
      Authorization: "Bearer 1"
