server:
  port: 8080
  host: 127.0.0.1
chat:
  whitelist_enabled: true
admin:
  username: admin
  password: admin
providers:
- name: volcengine
  enabled: true
  api: https://ark.cn-beijing.volces.com/api/coding/v3/chat/completions
  transport: http
  source_format: openai_chat
  target_format: openai_chat
  verify_ssl: false
  model_list:
  - kimi-k2.5
auth_groups:
- name: a
  strategy: least_inflight
  cooldown_seconds_on_429: 60
  entries:
  - id: a
    enabled: true
    headers:
      a: a
